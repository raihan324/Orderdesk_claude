services:
  db:
    image: postgres:16-alpine
    container_name: orderdesk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: orderdesk
      POSTGRES_PASSWORD: orderdesk
      POSTGRES_DB: orderdesk
    ports:
      - "5432:5432"
    volumes:
      - orderdesk_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderdesk"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  orderdesk_pgdata:
