<!doctype html>
<!--
  OrderDesk API — Swagger UI
  ==========================
  Loads ./openapi.yaml via the Swagger UI CDN. Two ways to view:

  1) Quick local preview (serves this folder so the browser can fetch the YAML):
       cd docs/api && npx http-server -p 8088 .
       open http://localhost:8088/swagger.html

  2) Mount inside the Next.js app (optional) — create a route that serves the spec
     and this page, e.g.:

       // src/app/api/docs/route.ts  -> returns this HTML
       // src/app/api/openapi.yaml/route.ts -> returns the YAML with content-type text/yaml
     Then visit /api/docs. Gate it behind `audit.read` (or internal-only) in production.

  Opening this file directly with file:// may be blocked by CORS for the YAML fetch;
  use option (1) or (2).
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OrderDesk API — Swagger UI</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      body { margin: 0; background: #fafafa; }
      .topbar { display: none; }
    </style>
  </head>
  <body>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js" crossorigin></script>
    <script>
      window.onload = () => {
        window.ui = SwaggerUIBundle({
          url: "./openapi.yaml",
          dom_id: "#swagger-ui",
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: "StandaloneLayout",
          persistAuthorization: true,
          tryItOutEnabled: true,
        });
      };
    </script>
  </body>
</html>
