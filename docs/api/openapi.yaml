        "200":
          description: Page of activity logs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Paginated"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/ActivityLog" } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /activity-logs/{id}:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    get:
      tags: [Activity Logs]
      summary: Get an activity log entry
      x-required-permission: audit.read
      x-implementation-status: proposed
      responses:
        "200": { description: Entry, content: { application/json: { schema: { $ref: "#/components/schemas/ActivityLog" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Clerk-issued session JWT for first-party clients.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: >
        Organization API key (`odk_<env>_<id>.<secret>`) for machine clients. Represents
        the main organization (not a user) and acts with the role assigned at creation.
        Keys can be created/rotated/revoked by a SUPER_ADMIN only.

  parameters:
    idPath:
      name: id
      in: path
      required: true
      schema: { type: string }
    page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    pageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    sort:
      name: sort
      in: query
      description: "Field name; prefix with '-' for descending. Default -createdAt."
      schema: { type: string, example: "-createdAt" }
    q:
      name: q
      in: query
      description: Free-text search (entity-specific fields).
      schema: { type: string }
    createdFrom:
      name: createdFrom
      in: query
      schema: { type: string, format: date-time }
    createdTo:
      name: createdTo
      in: query
      schema: { type: string, format: date-time }

  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" }, example: { error: { code: UNAUTHENTICATED, message: "Authentication required" } } } }
    Forbidden:
      description: Authenticated but not permitted (capability or ownership)
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" }, example: { error: { code: FORBIDDEN, message: "Not allowed to perform \"product.manage\"" } } } }
    NotFound:
      description: Resource not found
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" }, example: { error: { code: NOT_FOUND, message: "Resource not found" } } } }
    ValidationError:
      description: Request failed validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
          example:
            error:
              code: VALIDATION_ERROR
              message: "Invalid request body"
              details: [{ path: ["email"], message: "Valid email required" }]

  schemas:
    # --- enums ---
    InternalRole: { type: string, enum: [SUPER_ADMIN, ADMIN, MANAGER, SALES_REP, SUPPORT_AGENT, FINANCE_USER, STAFF] }
    ClientType: { type: string, enum: [B2B, B2C] }
    ContactType: { type: string, enum: [OWNER, DIRECTOR, MANAGER, ACCOUNTS, TECHNICAL, PROCUREMENT, PRIMARY, OTHER] }
    AccountStatus: { type: string, enum: [ACTIVE, INVITED, PENDING, SUSPENDED] }
    OrderStatus: { type: string, enum: [DRAFT, SUBMITTED, CONFIRMED, FULFILLED, CANCELLED] }
    LoanStatus: { type: string, enum: [APPLIED, UNDER_REVIEW, SANCTIONED, REJECTED, DISBURSED, CLOSED] }
    AffiliateStatus: { type: string, enum: [ACTIVE, SUSPENDED] }
    CommissionStatus: { type: string, enum: [PENDING, APPROVED, PAID, REVERSED] }
    Action:
      type: string
      enum: [user.manage, apikey.manage, client.read, client.manage, salesrep.assign, contact.manage, portal.invite, product.read, product.manage, order.read, order.manage, loan.read, loan.manage, loan.sanction, affiliate.read, affiliate.manage, commission.manage, audit.read]

    # --- envelopes ---
    Paginated:
      type: object
      properties:
        data: { type: array, items: {} }
        pagination:
          type: object
          properties:
            page: { type: integer }
            pageSize: { type: integer }
            total: { type: integer }
            totalPages: { type: integer }
    BulkResult:
      type: object
      properties:
        succeeded: { type: integer }
        failed: { type: integer }
        errors:
          type: array
          items: { type: object, properties: { id: { type: string }, message: { type: string } } }
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, enum: [BAD_REQUEST, UNAUTHENTICATED, FORBIDDEN, NOT_FOUND, CONFLICT, VALIDATION_ERROR, RATE_LIMITED, INTERNAL] }
            message: { type: string }
            details: { type: [array, "null"], items: { type: object } }

    Principal:
      oneOf:
        - type: object
          properties:
            kind: { type: string, const: INTERNAL }
            userId: { type: string }
            role: { $ref: "#/components/schemas/InternalRole" }
            name: { type: string }
        - type: object
          properties:
            kind: { type: string, const: PORTAL }
            contactId: { type: string }
            clientId: { type: string }
            name: { type: string }
            canManageOrgSettings: { type: boolean }
            canManagePortalUsers: { type: boolean }
        - type: object
          description: Organization service principal (resolved from an API key).
          properties:
            kind: { type: string, const: SERVICE }
            apiKeyId: { type: string }
            role: { $ref: "#/components/schemas/InternalRole" }
            name: { type: string }

    # --- API keys ---
    ApiKey:
      type: object
      description: Organization-level API key (not tied to a user). Secret is never returned after creation.
      properties:
        id: { type: string }
        name: { type: string }
        role: { $ref: "#/components/schemas/InternalRole", description: "Role the key acts as (all-scope)" }
        keyPrefix: { type: string, example: "odk_live_a1b2c3" }
        createdByUserId: { type: string, description: "The SUPER_ADMIN who created the key" }
        lastUsedAt: { type: [string, "null"], format: date-time }
        expiresAt: { type: [string, "null"], format: date-time }
        revokedAt: { type: [string, "null"], format: date-time }
        createdAt: { type: string, format: date-time }
    ApiKeyCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        role: { $ref: "#/components/schemas/InternalRole", description: "Role the org key acts as. Default ADMIN. Avoid own-scoped roles like SALES_REP." }
        scopes: { type: array, items: { $ref: "#/components/schemas/Action" }, description: "Optional narrowing; cannot widen the assigned role's permissions." }
        expiresAt: { type: string, format: date-time }

    # --- clients ---
    Client:
      type: object
      properties:
        id: { type: string }
        type: { $ref: "#/components/schemas/ClientType" }
        name: { type: string }
        status: { $ref: "#/components/schemas/AccountStatus" }
        industry: { type: [string, "null"] }
        website: { type: [string, "null"] }
        salesRepId: { type: [string, "null"] }
        currency: { type: string, example: USD }
        timezone: { type: string, example: UTC }
        language: { type: string, example: en }
        createdAt: { type: string, format: date-time }
    ClientDetail:
      allOf:
        - $ref: "#/components/schemas/Client"
        - type: object
          properties:
            contacts: { type: array, items: { $ref: "#/components/schemas/Contact" } }
            orders: { type: array, items: { $ref: "#/components/schemas/OrderSummary" } }
            canManage: { type: boolean }
            canAssign: { type: boolean }
    ClientCreateRequest:
      type: object
      required: [type, name]
      properties:
        type: { $ref: "#/components/schemas/ClientType" }
        name: { type: string, minLength: 1, maxLength: 200 }
        industry: { type: string, maxLength: 120, description: "B2B only; ignored for B2C" }
        website: { type: string, maxLength: 200, description: "B2B only" }
        salesRepId: { type: string, description: "Elevated roles only; reps are auto-assigned to self" }
    ClientUpdateRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        industry: { type: [string, "null"], maxLength: 120 }
        website: { type: [string, "null"], maxLength: 200 }
        status: { $ref: "#/components/schemas/AccountStatus" }

    # --- contacts ---
    Contact:
      type: object
      properties:
        id: { type: string }
        clientId: { type: string }
        type: { $ref: "#/components/schemas/ContactType" }
        name: { type: string }
        email: { type: string, format: email }
        phone: { type: [string, "null"] }
        jobTitle: { type: [string, "null"] }
        department: { type: [string, "null"] }
        position: { type: [string, "null"] }
        hasPortalAccess: { type: boolean }
        portalStatus: { $ref: "#/components/schemas/AccountStatus" }
        canManageOrgSettings: { type: boolean }
        canManagePortalUsers: { type: boolean }
        timezoneOverride: { type: [string, "null"] }
        currencyOverride: { type: [string, "null"] }
        languageOverride: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
    ContactCreateRequest:
      type: object
      required: [name, email]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        email: { type: string, format: email }
        type: { $ref: "#/components/schemas/ContactType", default: OTHER }
        jobTitle: { type: string, maxLength: 120 }
        phone: { type: string, maxLength: 40 }
    ContactUpdateRequest:
      type: object
      required: [name, email, type]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        email: { type: string, format: email }
        type: { $ref: "#/components/schemas/ContactType" }
        jobTitle: { type: string, maxLength: 120 }
        phone: { type: string, maxLength: 40 }
        department: { type: string, maxLength: 120 }
        position: { type: string, maxLength: 120 }
        canManageOrgSettings: { type: boolean, default: false }
        canManagePortalUsers: { type: boolean, default: false }
    OwnContactUpdateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        phone: { type: string, maxLength: 40 }
        jobTitle: { type: string, maxLength: 120 }
        department: { type: string, maxLength: 120 }
        position: { type: string, maxLength: 120 }
        timezone: { type: string, maxLength: 60 }
        currency: { type: string, maxLength: 10 }
        language: { type: string, maxLength: 20 }

    # --- products ---
    Product:
      type: object
      properties:
        id: { type: string }
        sku: { type: string }
        name: { type: string }
        unitPriceCents: { type: integer, description: "Integer cents" }
        stock: { type: integer }
        isActive: { type: boolean }
    ProductCreateRequest:
      type: object
      required: [sku, name, unitPrice]
      properties:
        sku: { type: string, minLength: 1, maxLength: 64 }
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, maxLength: 2000 }
        unitPrice: { type: number, minimum: 0, multipleOf: 0.01, description: "Decimal major units; stored as cents" }
        stock: { type: integer, minimum: 0, default: 0 }
    ProductUpdateRequest:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, maxLength: 2000 }
        unitPrice: { type: number, minimum: 0, multipleOf: 0.01 }
        stock: { type: integer, minimum: 0 }
        isActive: { type: boolean }

    # --- orders ---
    OrderSummary:
      type: object
      properties:
        id: { type: string }
        orderNumber: { type: string }
        clientId: { type: string }
        clientName: { type: string }
        status: { $ref: "#/components/schemas/OrderStatus" }
        totalCents: { type: integer }
        currency: { type: string }
        createdAt: { type: string, format: date-time }
    Order:
      type: object
      properties:
        id: { type: string }
        orderNumber: { type: string }
        clientId: { type: string }
        affiliateId: { type: [string, "null"] }
        status: { $ref: "#/components/schemas/OrderStatus" }
        totalCents: { type: integer }
        currency: { type: string }
        createdAt: { type: string, format: date-time }
    OrderItem:
      type: object
      properties:
        productId: { type: string }
        productName: { type: string }
        quantity: { type: integer }
        unitPriceCents: { type: integer }
        lineTotalCents: { type: integer }
    OrderDetail:
      type: object
      properties:
        order: { $ref: "#/components/schemas/Order" }
        items: { type: array, items: { $ref: "#/components/schemas/OrderItem" } }
    OrderCreateRequest:
      type: object
      required: [clientId, items]
      properties:
        clientId: { type: string, minLength: 1 }
        affiliateCode: { type: string, maxLength: 40, description: "Optional referral code; records a PENDING commission" }
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [productId, quantity]
            properties:
              productId: { type: string, minLength: 1 }
              quantity: { type: integer, minimum: 1, maximum: 10000 }

    # --- users ---
    User:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        role: { $ref: "#/components/schemas/InternalRole" }
        status: { $ref: "#/components/schemas/AccountStatus" }
        linked: { type: boolean, description: "True once the Clerk identity is linked" }
        createdAt: { type: string, format: date-time }
    UserInviteRequest:
      type: object
      required: [email, name, role]
      properties:
        email: { type: string, format: email, description: "Trimmed + lowercased" }
        name: { type: string, minLength: 1, maxLength: 200 }
        role: { $ref: "#/components/schemas/InternalRole" }

    # --- loans / lenders ---
    LoanSummary:
      type: object
      properties:
        id: { type: string }
        status: { $ref: "#/components/schemas/LoanStatus" }
        principalCents: { type: integer }
        sanctionedAmountCents: { type: [integer, "null"] }
        currency: { type: string }
        tenureMonths: { type: integer }
        interestRateBps: { type: integer, description: "Basis points" }
        borrowerName: { type: string }
        borrowerClientId: { type: string }
        lenderName: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
    Loan:
      type: object
      properties:
        id: { type: string }
        lenderId: { type: [string, "null"] }
        borrowerClientId: { type: string }
        principalCents: { type: integer }
        currency: { type: string }
        purpose: { type: [string, "null"] }
        tenureMonths: { type: integer }
        interestRateBps: { type: integer }
        status: { $ref: "#/components/schemas/LoanStatus" }
        sanctionedAmountCents: { type: [integer, "null"] }
        sanctionedAt: { type: [string, "null"], format: date-time }
        disbursedAt: { type: [string, "null"], format: date-time }
        rejectionReason: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
    LoanDetail:
      type: object
      properties:
        loan: { $ref: "#/components/schemas/Loan" }
        borrower: { $ref: "#/components/schemas/Client" }
        lender: { oneOf: [ { $ref: "#/components/schemas/Lender" }, { type: "null" } ] }
    LoanCreateRequest:
      type: object
      required: [borrowerClientId, principal, tenureMonths, interestRatePct]
      properties:
        borrowerClientId: { type: string, minLength: 1 }
        lenderId: { type: string }
        principal: { type: number, exclusiveMinimum: 0, description: "Decimal major units; stored as cents" }
        currency: { type: string, minLength: 1, maxLength: 10, default: USD }
        purpose: { type: string, maxLength: 500 }
        tenureMonths: { type: integer, minimum: 1, maximum: 600 }
        interestRatePct: { type: number, minimum: 0, maximum: 100, description: "Percent; stored as basis points" }
    LoanSanctionRequest:
      type: object
      required: [sanctionedAmount, interestRatePct, tenureMonths]
      properties:
        sanctionedAmount: { type: number, exclusiveMinimum: 0 }
        interestRatePct: { type: number, minimum: 0, maximum: 100 }
        tenureMonths: { type: integer, minimum: 1, maximum: 600 }
        lenderId: { type: string }
    Lender:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        contactEmail: { type: [string, "null"], format: email }
        contactPhone: { type: [string, "null"] }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
    LenderCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        contactEmail: { type: string, format: email }
        contactPhone: { type: string, maxLength: 40 }

    # --- affiliates / commissions ---
    Affiliate:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        referralCode: { type: string, example: "REF-7F3K9Q" }
        commissionRateBps: { type: integer, description: "Basis points" }
        status: { $ref: "#/components/schemas/AffiliateStatus" }
        createdAt: { type: string, format: date-time }
    AffiliateWithEarnings:
      allOf:
        - $ref: "#/components/schemas/Affiliate"
        - type: object
          properties:
            earnedCents: { type: integer }
            orderCount: { type: integer }
    AffiliateDetail:
      type: object
      properties:
        affiliate: { $ref: "#/components/schemas/Affiliate" }
        commissions: { type: array, items: { $ref: "#/components/schemas/Commission" } }
    AffiliateCreateRequest:
      type: object
      required: [name, email]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        email: { type: string, format: email }
        commissionRatePct: { type: number, minimum: 0, maximum: 100, default: 5, description: "Percent; stored as bps" }
    AffiliateUpdateRequest:
      type: object
      required: [name, email, commissionRatePct, status]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        email: { type: string, format: email }
        commissionRatePct: { type: number, minimum: 0, maximum: 100 }
        status: { $ref: "#/components/schemas/AffiliateStatus" }
    Commission:
      type: object
      properties:
        id: { type: string }
        affiliateId: { type: string }
        affiliateName: { type: string }
        orderId: { type: string }
        orderNumber: { type: [string, "null"] }
        orderTotalCents: { type: integer }
        commissionRateBps: { type: integer }
        commissionCents: { type: integer }
        currency: { type: string }
        status: { $ref: "#/components/schemas/CommissionStatus" }
        createdAt: { type: string, format: date-time }

    # --- profile / smtp ---
    Profile:
      type: object
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        phone: { type: [string, "null"] }
        jobTitle: { type: [string, "null"] }
        avatarUrl: { type: [string, "null"] }
        role: { type: string }
        createdAt: { type: string, format: date-time }
    ProfileUpdateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        phone: { type: string, maxLength: 50 }
        jobTitle: { type: string, maxLength: 200 }
        avatarUrl: { type: string, format: uri, maxLength: 2000 }
    SmtpSettings:
      type: object
      description: Secrets (password / OAuth token) are never returned.
      properties:
        id: { type: string }
        userId: { type: string }
        authMethod: { type: string, enum: [password, oauth2_google] }
        smtpHost: { type: string }
        smtpPort: { type: integer }
        smtpSecure: { type: boolean }
        smtpUsername: { type: string }
        fromName: { type: string }
        fromEmail: { type: string, format: email }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    SmtpUpdateRequest:
      type: object
      required: [smtpHost, smtpPort, smtpUsername, smtpPassword, fromName, fromEmail]
      properties:
        smtpHost: { type: string, minLength: 1 }
        smtpPort: { type: integer, minimum: 1, maximum: 65535 }
        smtpSecure: { type: boolean, default: true }
        smtpUsername: { type: string, minLength: 1 }
        smtpPassword: { type: string, minLength: 1, description: "Encrypted at rest; never returned" }
        fromName: { type: string, minLength: 1 }
        fromEmail: { type: string, format: email }

    # --- audit ---
    ActivityLog:
      type: object
      properties:
        id: { type: string }
        actorId: { type: [string, "null"] }
        actorType: { type: string, enum: [USER, CONTACT, LENDER, AFFILIATE, SERVICE, SYSTEM] }
        actorName: { type: [string, "null"] }
        action: { type: string, example: "loan.sanctioned" }
        entityType: { type: string, example: "Loan" }
        entityId: { type: [string, "null"] }
        metadata: { type: [object, "null"] }
        ipAddress: { type: [string, "null"] }
        createdAt: { type: string, format: date-time }
