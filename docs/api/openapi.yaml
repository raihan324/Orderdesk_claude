openapi: 3.1.0
info:
  title: OrderDesk REST API
  version: 1.0.0
  description: >
    REST API for OrderDesk, derived from the existing service layer and RBAC model.

    Authentication: first-party clients send a Clerk-issued JWT as
    `Authorization: Bearer <token>`; machine clients send `X-API-Key`. Both resolve
    to the same Principal and are authorized by the existing `authorize()` rules.

    Money is integer cents (`*Cents`); rates are basis points (`*Bps`). Request
    bodies accept human amounts (decimal major units / percent) which the server
    converts. Order pricing is server-authoritative.

    Per-operation vendor extensions: `x-required-permission` (the RBAC Action),
    `x-roles` (roles that satisfy it), `x-implementation-status`
    (backed = service method exists, proposed = small new service method needed).
  license:
    name: Proprietary
servers:
  - url: /api/v1
    description: Versioned API base path

security:
  - bearerAuth: []
  - apiKeyAuth: []

tags:
  - name: Auth
  - name: API Keys
  - name: Clients
  - name: Contacts
  - name: Products
  - name: Orders
  - name: Users
  - name: Roles & Permissions
  - name: Loans
  - name: Lenders
  - name: Affiliates
  - name: Commissions
  - name: Profile & SMTP
  - name: Activity Logs

paths:
  # ----------------------------------------------------------------- Auth
  /me:
    get:
      tags: [Auth]
      summary: Resolve the organization principal for an API key (IMPLEMENTED)
      description: >
        Built sample endpoint. Send `X-API-Key` and it returns the resolved
        organization SERVICE principal. Returns 401 for a missing/invalid/revoked/expired key.
      security:
        - apiKeyAuth: []
      x-required-permission: valid API key
      x-implementation-status: built
      responses:
        "200":
          description: The organization service principal
          content:
            application/json:
              schema:
                type: object
                properties:
                  principal: { $ref: "#/components/schemas/Principal" }
              example:
                principal: { kind: SERVICE, apiKeyId: "ak_123", role: ADMIN, name: "API: CI pipeline" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/me:
    get:
      tags: [Auth]
      summary: Current principal
      description: Returns the resolved internal user or portal contact for the credentials.
      x-required-permission: authenticated
      x-implementation-status: proposed
      responses:
        "200":
          description: The authenticated principal
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Principal" }
              examples:
                internal:
                  value: { kind: INTERNAL, userId: "u_123", role: ADMIN, name: "Raihan" }
                portal:
                  value: { kind: PORTAL, contactId: "c_9", clientId: "cl_4", name: "Jane Doe", canManageOrgSettings: false, canManagePortalUsers: false }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token (JWT option)
      security: []
      x-required-permission: public
      x-implementation-status: proposed
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: { refreshToken: { type: string } }
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken: { type: string }
                  expiresIn: { type: integer, example: 900 }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke current session / refresh token
      x-required-permission: authenticated
      x-implementation-status: proposed
      responses:
        "204": { description: Logged out }
        "401": { $ref: "#/components/responses/Unauthorized" }

  # ------------------------------------------------------------- API Keys
  /api-keys:
    get:
      tags: [API Keys]
      summary: List the organization's API keys
      description: Organization-level keys. SUPER_ADMIN only. Returns metadata only — secrets are never returned after creation.
      x-required-permission: apikey.manage
      x-roles: [SUPER_ADMIN]
      x-implementation-status: proposed
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
      responses:
        "200":
          description: Page of API keys
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Paginated"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/ApiKey" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [API Keys]
      summary: Create an organization API key
      description: SUPER_ADMIN only. The key represents the organization and acts with the assigned role. The plaintext key is returned exactly once and cannot be retrieved again.
      x-required-permission: apikey.manage
      x-roles: [SUPER_ADMIN]
      x-implementation-status: proposed
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ApiKeyCreateRequest" }
            example: { name: "CI pipeline", role: ADMIN, expiresAt: "2027-01-01T00:00:00Z" }
      responses:
        "201":
          description: Created — includes the one-time plaintext secret
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiKey"
                  - type: object
                    properties:
                      plaintext:
                        type: string
                        example: "odk_live_a1b2c3.0f9e8d7c6b5a4938271605f4e3d2c1b0"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /api-keys/{id}:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    get:
      tags: [API Keys]
      summary: Get API key metadata
      x-required-permission: apikey.manage
      x-roles: [SUPER_ADMIN]
      x-implementation-status: proposed
      responses:
        "200":
          description: Key metadata
          content: { application/json: { schema: { $ref: "#/components/schemas/ApiKey" } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [API Keys]
      summary: Revoke an API key
      x-required-permission: apikey.manage
      x-roles: [SUPER_ADMIN]
      x-implementation-status: proposed
      responses:
        "204": { description: Revoked }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api-keys/{id}/rotate:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    post:
      tags: [API Keys]
      summary: Rotate an API key
      description: SUPER_ADMIN only. Issues a new secret for the same key id; the previous secret is invalidated immediately.
      x-required-permission: apikey.manage
      x-roles: [SUPER_ADMIN]
      x-implementation-status: proposed
      responses:
        "200":
          description: Rotated — new one-time plaintext secret
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiKey"
                  - type: object
                    properties: { plaintext: { type: string } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api-keys/{id}/usage:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    get:
      tags: [API Keys]
      summary: API key usage
      x-required-permission: apikey.manage
      x-roles: [SUPER_ADMIN]
      x-implementation-status: proposed
      responses:
        "200":
          description: Usage summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalRequests: { type: integer, example: 1820 }
                  lastUsedAt: { type: [string, "null"], format: date-time }
                  last30dByDay:
                    type: array
                    items:
                      type: object
                      properties: { date: { type: string, format: date }, count: { type: integer } }

  # ------------------------------------------------------------- Clients
  /clients:
    get:
      tags: [Clients]
      summary: List clients
      description: Sales reps see only their assigned clients (ownership-scoped after filters).
      x-required-permission: client.read
      x-roles: [SUPER_ADMIN, ADMIN, MANAGER, "SALES_REP (own)", SUPPORT_AGENT, FINANCE_USER, STAFF]
      x-implementation-status: backed
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/sort"
        - $ref: "#/components/parameters/q"
        - $ref: "#/components/parameters/createdFrom"
        - $ref: "#/components/parameters/createdTo"
        - name: type
          in: query
          schema: { $ref: "#/components/schemas/ClientType" }
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/AccountStatus" }
        - name: salesRepId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Page of clients
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Paginated"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/Client" } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Clients]
      summary: Create a client
      description: Managers+ may assign any rep; a Sales Rep may only create self-owned clients.
      x-required-permission: client.manage
      x-roles: [SUPER_ADMIN, ADMIN, MANAGER, "SALES_REP (self-owned)"]
      x-implementation-status: backed
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ClientCreateRequest" }
            examples:
              b2b: { value: { type: B2B, name: "Acme Inc.", industry: "Manufacturing", website: "https://acme.com", salesRepId: "u_55" } }
              b2c: { value: { type: B2C, name: "Jane Doe" } }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/Client" } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /clients/{id}:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    get:
      tags: [Clients]
      summary: Get client
      x-required-permission: client.read
      x-implementation-status: backed
      responses:
        "200":
          description: Client with derived capability flags
          content: { application/json: { schema: { $ref: "#/components/schemas/ClientDetail" } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Clients]
      summary: Update client
      x-required-permission: client.manage
      x-implementation-status: proposed
      requestBody:
        content: { application/json: { schema: { $ref: "#/components/schemas/ClientUpdateRequest" } } }
      responses:
        "200":
          description: Updated
          content: { application/json: { schema: { $ref: "#/components/schemas/Client" } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Clients]
      summary: Delete (deactivate) client
      description: Recommended soft-delete via status; cascades to contacts if hard-deleted.
      x-required-permission: client.manage
      x-implementation-status: proposed
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /clients/{id}/contacts:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    get:
      tags: [Contacts]
      summary: List a client's contacts
      x-required-permission: client.read
      x-implementation-status: backed
      responses:
        "200":
          description: Contacts for the client
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Contact" } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      tags: [Contacts]
      summary: Add a contact to a client
      x-required-permission: contact.manage
      x-implementation-status: backed
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ContactCreateRequest" }
            example: { name: "John Buyer", email: "john@acme.com", type: PROCUREMENT, jobTitle: "Buyer", phone: "+1 555 0100" }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/Contact" } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /clients/{id}/orders:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    get:
      tags: [Orders]
      summary: List a client's orders
      x-required-permission: order.read
      x-implementation-status: backed
      responses:
        "200":
          description: Orders for the client
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/OrderSummary" } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /clients/{id}/assign-rep:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    post:
      tags: [Clients]
      summary: Assign (or clear) the sales rep
      x-required-permission: salesrep.assign
      x-roles: [SUPER_ADMIN, ADMIN, MANAGER]
      x-implementation-status: backed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { repId: { type: [string, "null"], description: "User id of a SALES_REP, or null to unassign" } }
            example: { repId: "u_55" }
      responses:
        "204": { description: Assigned }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  # ------------------------------------------------------------ Contacts
  /contacts/{id}:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    get:
      tags: [Contacts]
      summary: Get contact
      x-required-permission: client.read
      x-implementation-status: backed
      responses:
        "200":
          description: Contact
          content: { application/json: { schema: { $ref: "#/components/schemas/Contact" } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Contacts]
      summary: Update contact
      description: Portal permission flags only apply if the contact has portal access.
      x-required-permission: contact.manage
      x-implementation-status: backed
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ContactUpdateRequest" } } }
      responses:
        "200":
          description: Updated
          content: { application/json: { schema: { $ref: "#/components/schemas/Contact" } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Contacts]
      summary: Delete contact
      x-required-permission: contact.manage
      x-implementation-status: proposed
      responses:
        "204": { description: Deleted }
        "403": { $ref: "#/components/responses/Forbidden" }
  /contacts/{id}/invite:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    post:
      tags: [Contacts]
      summary: Invite contact to the customer portal
      description: Sets portal access INVITED and best-effort sends a sign-up email.
      x-required-permission: portal.invite
      x-implementation-status: backed
      responses:
        "200":
          description: Invite processed
          content:
            application/json:
              schema:
                type: object
                properties: { emailed: { type: boolean } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /portal/me:
    patch:
      tags: [Contacts]
      summary: Portal self-service profile update
      description: Portal contacts only. Cannot change email, type, or portal permissions.
      x-required-permission: PORTAL self
      x-implementation-status: backed
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/OwnContactUpdateRequest" } } }
      responses:
        "200":
          description: Updated
          content: { application/json: { schema: { $ref: "#/components/schemas/Contact" } } }
        "403": { $ref: "#/components/responses/Forbidden" }

  # ------------------------------------------------------------ Products
  /products:
    get:
      tags: [Products]
      summary: List products
      description: Active catalog. Readable by all authenticated principals including portal contacts.
      x-required-permission: product.read
      x-implementation-status: backed
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/sort"
        - $ref: "#/components/parameters/q"
      responses:
        "200":
          description: Page of products
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Paginated"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/Product" } }
    post:
      tags: [Products]
      summary: Create product
      x-required-permission: product.manage
      x-roles: [SUPER_ADMIN, ADMIN]
      x-implementation-status: backed
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductCreateRequest" }
            example: { sku: "WIDGET-1", name: "Blue Widget", description: "Standard widget", unitPrice: 9.99, stock: 100 }
      responses:
        "201":
          description: Created
          content: { application/json: { schema: { $ref: "#/components/schemas/Product" } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /products/{id}:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    get:
      tags: [Products]
      summary: Get product
      x-required-permission: product.read
      x-implementation-status: proposed
      responses:
        "200": { description: Product, content: { application/json: { schema: { $ref: "#/components/schemas/Product" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Products]
      summary: Update product
      x-required-permission: product.manage
      x-implementation-status: proposed
      requestBody:
        content: { application/json: { schema: { $ref: "#/components/schemas/ProductUpdateRequest" } } }
      responses:
        "200": { description: Updated, content: { application/json: { schema: { $ref: "#/components/schemas/Product" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
    delete:
      tags: [Products]
      summary: Deactivate product (soft delete)
      x-required-permission: product.manage
      x-implementation-status: proposed
      responses:
        "204": { description: Deactivated }
        "403": { $ref: "#/components/responses/Forbidden" }
  /products/bulk:
    post:
      tags: [Products]
      summary: Bulk upsert products
      x-required-permission: product.manage
      x-implementation-status: proposed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items: { type: array, items: { $ref: "#/components/schemas/ProductCreateRequest" } }
      responses:
        "200":
          description: Bulk result
          content: { application/json: { schema: { $ref: "#/components/schemas/BulkResult" } } }

  # -------------------------------------------------------------- Orders
  /orders:
    get:
      tags: [Orders]
      summary: List orders
      description: Reps see own clients' orders; portal contacts see only their client's orders.
      x-required-permission: order.read
      x-implementation-status: backed
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/sort"
        - $ref: "#/components/parameters/createdFrom"
        - $ref: "#/components/parameters/createdTo"
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/OrderStatus" }
        - name: clientId
          in: query
          schema: { type: string }
        - name: affiliateId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Page of orders
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Paginated"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/OrderSummary" } }
    post:
      tags: [Orders]
      summary: Create order
      description: >
        Send only productId + quantity; the server prices each line from the live catalog.
        An optional affiliate referral code records a PENDING commission and stamps the order.
      x-required-permission: order.manage
      x-implementation-status: backed
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrderCreateRequest" }
            example:
              clientId: "cl_4"
              affiliateCode: "REF-7F3K9Q"
              items:
                - { productId: "p_1", quantity: 3 }
                - { productId: "p_2", quantity: 1 }
      responses:
        "201":
          description: Created (status SUBMITTED)
          content: { application/json: { schema: { $ref: "#/components/schemas/Order" } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409":
          description: Invalid product (inactive/unknown)
          content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
        "422": { $ref: "#/components/responses/ValidationError" }
  /orders/{id}:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    get:
      tags: [Orders]
      summary: Get order with items
      x-required-permission: order.read
      x-implementation-status: backed
      responses:
        "200":
          description: Order detail
          content: { application/json: { schema: { $ref: "#/components/schemas/OrderDetail" } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /orders/{id}/items:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    get:
      tags: [Orders]
      summary: List order line items
      x-required-permission: order.read
      x-implementation-status: backed
      responses:
        "200":
          description: Line items
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/OrderItem" } }
        "403": { $ref: "#/components/responses/Forbidden" }
  /orders/{id}/status:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    patch:
      tags: [Orders]
      summary: Transition order status
      description: DRAFT → SUBMITTED → CONFIRMED → FULFILLED, or CANCELLED.
      x-required-permission: order.manage
      x-implementation-status: proposed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties: { status: { $ref: "#/components/schemas/OrderStatus" } }
      responses:
        "200": { description: Updated, content: { application/json: { schema: { $ref: "#/components/schemas/Order" } } } }
        "409": { description: Invalid transition, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /orders/bulk-status:
    post:
      tags: [Orders]
      summary: Bulk status transition
      x-required-permission: order.manage
      x-implementation-status: proposed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids: { type: array, items: { type: string } }
                status: { $ref: "#/components/schemas/OrderStatus" }
      responses:
        "200": { description: Bulk result, content: { application/json: { schema: { $ref: "#/components/schemas/BulkResult" } } } }

  # --------------------------------------------------------------- Users
  /users:
    get:
      tags: [Users]
      summary: List internal users
      x-required-permission: user.manage
      x-roles: [SUPER_ADMIN]
      x-implementation-status: backed
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/q"
        - name: role
          in: query
          schema: { $ref: "#/components/schemas/InternalRole" }
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/AccountStatus" }
      responses:
        "200":
          description: Page of users
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Paginated"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/User" } }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [Users]
      summary: Invite an internal user
      x-required-permission: user.manage
      x-implementation-status: backed
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserInviteRequest" }
            example: { email: "new.staff@company.com", name: "New Staff", role: SALES_REP }
      responses:
        "201":
          description: Invited
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: "#/components/schemas/User" }
                  emailed: { type: boolean }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: Email already exists, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "422": { $ref: "#/components/responses/ValidationError" }
  /users/{id}:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    get:
      tags: [Users]
      summary: Get user
      x-required-permission: user.manage
      x-implementation-status: proposed
      responses:
        "200": { description: User, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /users/{id}/role:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    patch:
      tags: [Users]
      summary: Change user role
      description: Cannot demote the last SUPER_ADMIN or change your own role.
      x-required-permission: user.manage
      x-implementation-status: backed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties: { role: { $ref: "#/components/schemas/InternalRole" } }
      responses:
        "204": { description: Updated }
        "409": { description: LAST_SUPER_ADMIN / CANNOT_CHANGE_OWN_ROLE, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /users/{id}/status:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    patch:
      tags: [Users]
      summary: Change user status
      x-required-permission: user.manage
      x-implementation-status: backed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties: { status: { $ref: "#/components/schemas/AccountStatus" } }
      responses:
        "204": { description: Updated }
        "409": { description: LAST_SUPER_ADMIN / CANNOT_SUSPEND_SELF, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  # ------------------------------------------------- Roles & Permissions
  /roles:
    get:
      tags: [Roles & Permissions]
      summary: List roles (code-defined metadata)
      x-required-permission: authenticated internal
      x-implementation-status: proposed
      responses:
        "200":
          description: Roles
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/InternalRole" } }
  /roles/{role}/permissions:
    parameters:
      - name: role
        in: path
        required: true
        schema: { $ref: "#/components/schemas/InternalRole" }
    get:
      tags: [Roles & Permissions]
      summary: Effective permissions for a role
      x-required-permission: authenticated internal
      x-implementation-status: proposed
      responses:
        "200":
          description: Action → scope map
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { type: string, enum: [all, own, none] }
              example: { "client.read": all, "product.manage": none, "order.read": own }
  /permissions:
    get:
      tags: [Roles & Permissions]
      summary: List all permission actions
      x-required-permission: authenticated internal
      x-implementation-status: proposed
      responses:
        "200":
          description: Actions
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Action" } }

  # --------------------------------------------------------------- Loans
  /loans:
    get:
      tags: [Loans]
      summary: List loans
      x-required-permission: loan.read
      x-implementation-status: backed
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - name: status
          in: query
          schema: { $ref: "#/components/schemas/LoanStatus" }
        - name: borrowerClientId
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Page of loans
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Paginated"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/LoanSummary" } }
    post:
      tags: [Loans]
      summary: Create a loan application
      x-required-permission: loan.manage
      x-implementation-status: backed
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoanCreateRequest" }
            example: { borrowerClientId: "cl_4", lenderId: "ld_1", principal: 50000, currency: USD, purpose: "Working capital", tenureMonths: 24, interestRatePct: 12.5 }
      responses:
        "201": { description: Created (APPLIED), content: { application/json: { schema: { $ref: "#/components/schemas/Loan" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }
  /loans/{id}:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    get:
      tags: [Loans]
      summary: Get loan with borrower & lender
      x-required-permission: loan.read
      x-implementation-status: backed
      responses:
        "200": { description: Loan detail, content: { application/json: { schema: { $ref: "#/components/schemas/LoanDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /loans/{id}/review:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    post:
      tags: [Loans]
      summary: Move APPLIED → UNDER_REVIEW
      x-required-permission: loan.sanction
      x-implementation-status: backed
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { lenderId: { type: string } } }
      responses:
        "204": { description: In review }
        "409": { description: INVALID_TRANSITION, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /loans/{id}/sanction:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    post:
      tags: [Loans]
      summary: Sanction a loan
      x-required-permission: loan.sanction
      x-roles: [SUPER_ADMIN, ADMIN, FINANCE_USER]
      x-implementation-status: backed
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoanSanctionRequest" }
            example: { sanctionedAmount: 45000, interestRatePct: 12.5, tenureMonths: 24, lenderId: "ld_1" }
      responses:
        "200": { description: Sanctioned, content: { application/json: { schema: { $ref: "#/components/schemas/Loan" } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { description: INVALID_TRANSITION, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /loans/{id}/reject:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    post:
      tags: [Loans]
      summary: Reject a loan
      x-required-permission: loan.sanction
      x-implementation-status: backed
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { reason: { type: string } } }
      responses:
        "204": { description: Rejected }
        "409": { description: INVALID_TRANSITION, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /loans/{id}/disburse:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    post:
      tags: [Loans]
      summary: Mark SANCTIONED → DISBURSED
      x-required-permission: loan.sanction
      x-implementation-status: backed
      responses:
        "204": { description: Disbursed }
        "409": { description: INVALID_TRANSITION, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /loans/{id}/close:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    post:
      tags: [Loans]
      summary: Mark DISBURSED → CLOSED
      x-required-permission: loan.sanction
      x-implementation-status: backed
      responses:
        "204": { description: Closed }
        "409": { description: INVALID_TRANSITION, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  # ------------------------------------------------------------- Lenders
