  # -------------------------------------------------------- Activity logs
  /activity-logs:
    get:
      tags: [Activity Logs]
      summary: List audit/activity entries
      x-required-permission: audit.read
      x-roles: [SUPER_ADMIN, ADMIN, MANAGER]
      x-implementation-status: proposed
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/pageSize"
        - $ref: "#/components/parameters/createdFrom"
        - $ref: "#/components/parameters/createdTo"
        - name: action
          in: query
          schema: { type: string, example: "order.created" }
        - name: entityType
          in: query
          schema: { type: string, example: "Order" }
        - name: entityId
          in: query
          schema: { type: string }
        - name: actorId
          in: query
          schema: { type: string }
