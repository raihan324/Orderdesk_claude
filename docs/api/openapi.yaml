      x-required-permission: authenticated internal (self)
      x-implementation-status: backed
      responses:
        "200": { description: Profile, content: { application/json: { schema: { $ref: "#/components/schemas/Profile" } } } }
    patch:
      tags: [Profile & SMTP]
      summary: Update my profile
      x-required-permission: authenticated internal (self)
      x-implementation-status: backed
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProfileUpdateRequest" }
            example: { name: "Raihan U.", phone: "+880 1700 000000", jobTitle: "Owner", avatarUrl: "https://cdn.example.com/me.png" }
      responses:
        "200": { description: Updated, content: { application/json: { schema: { $ref: "#/components/schemas/Profile" } } } }
        "422": { $ref: "#/components/responses/ValidationError" }
  /settings/smtp:
    get:
      tags: [Profile & SMTP]
      summary: Get my SMTP settings (no secrets)
      x-required-permission: authenticated internal (self)
      x-implementation-status: backed
      responses:
