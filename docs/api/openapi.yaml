      tags: [Commissions]
      summary: Get commission
      x-required-permission: affiliate.read
      x-implementation-status: proposed
      responses:
        "200": { description: Commission, content: { application/json: { schema: { $ref: "#/components/schemas/Commission" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
  /commissions/{id}/status:
    parameters: [{ $ref: "#/components/parameters/idPath" }]
    patch:
      tags: [Commissions]
      summary: Approve / pay / reverse a commission
      x-required-permission: commission.manage
