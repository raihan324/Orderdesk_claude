name: Migrate (db:push)

# Manual schema sync against the production database. Run from the Actions tab
# (Run workflow) after a deploy that changed the Drizzle schema. This builds the
# one-off `migrate` service on the VPS and runs `npm run db:push`, which applies
# only the diff. It does NOT touch the running app container.
#
# A typed confirmation is required so this can't fire by accident.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "migrate" to confirm running db:push against production'
        required: true
        default: ''

concurrency:
  group: migrate-production
  cancel-in-progress: false

jobs:
  migrate:
    name: Run db:push on VPS
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "migrate" ]; then
            echo "Confirmation mismatch — type 'migrate' to proceed." >&2
            exit 1
          fi

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run migrate profile
        run: |
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o UserKnownHostsFile=~/.ssh/known_hosts \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'cd /docker/Orderdesk_claude && docker compose -f docker-compose.prod.yml --profile migrate run --rm migrate'
