# Production stack for srv1699350 — app fronted by the existing Traefik (which
# lives on network google-auth-app_app-network and publishes :80/:443), talking
# to the existing database (postgresql-3ada-postgresql-1 on postgresql-3ada_default).
#
# The app joins BOTH external networks: "web" so Traefik can reach it, "dbnet"
# for Postgres. There is no db service — the data already lives in postgresql-3ada.
# All secrets/build args come from .env (NOT committed; lives on the VPS).
#
#   docker compose -f docker-compose.prod.yml up -d --build app
services:
  app:
    build:
      context: .
      args:
        AUTH_MODE: ${AUTH_MODE}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL}
        NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL}
        DATABASE_URL: ${DATABASE_URL}
    container_name: orderdesk-app
    restart: unless-stopped
    env_file: .env
    networks:
      - web
      - dbnet
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=google-auth-app_app-network"
      - "traefik.http.routers.orderdesk.rule=Host(`orderdesk.techwavesolutions.net`) || Host(`orderdesk.srv1699350.hstgr.cloud`)"
      - "traefik.http.routers.orderdesk.entrypoints=websecure"
      - "traefik.http.routers.orderdesk.tls=true"
      - "traefik.http.routers.orderdesk.tls.certresolver=letsencrypt"
      - "traefik.http.services.orderdesk.loadbalancer.server.port=3000"

  # One-off schema sync against the existing DB (idempotent):
  #   docker compose -f docker-compose.prod.yml --profile migrate run --rm migrate
  migrate:
    build:
      context: .
      target: builder
      args:
        AUTH_MODE: ${AUTH_MODE}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        DATABASE_URL: ${DATABASE_URL}
    env_file: .env
    networks:
      - dbnet
    command: ["npm", "run", "db:push"]
    profiles: ["migrate"]

networks:
  web:
    name: google-auth-app_app-network
    external: true
  dbnet:
    name: postgresql-3ada_default
    external: true
